name: Build RustDesk patched dylib

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-26-intel

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.83.0"

      - name: Check for rustup target
        run: rustup show

      - name: Install vcpkg and deps (nasm, ffmpeg)
        run: |
          # aom rejects NASM 3.x on current macOS runners; pin a compatible 2.16.x binary.
          curl -L -o /tmp/nasm.zip https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -q /tmp/nasm.zip -d /tmp
          echo "/tmp/nasm-2.16.03" >> "$GITHUB_PATH"
          /tmp/nasm-2.16.03/nasm -v
          git clone https://github.com/microsoft/vcpkg /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          # Disable audiotoolbox in ffmpeg to avoid Dart VM symbol conflict
          sed -i '' 's/--enable-audiotoolbox/--disable-audiotoolbox/' /tmp/vcpkg/ports/ffmpeg/portfile.cmake
          /tmp/vcpkg/vcpkg add port ffmpeg
          /tmp/vcpkg/vcpkg install
          # Fix path mismatch: manifest mode installs to repo_root/vcpkg_installed/
          ln -sf "$(pwd)/vcpkg_installed" /tmp/vcpkg/installed

      - name: Build
        run: |
          export VCPKG_ROOT=/tmp/vcpkg
          cargo build --features flutter,hwcodec --release

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: liblibrustdesk.dylib
          path: target/release/liblibrustdesk.dylib

      - name: Verify artifact exists
        run: ls -lh target/release/liblibrustdesk.dylib
